name: tests

on:
  push:
    # The tick/calendar crons commit data/drops.db back to main on nearly every
    # run (last_seen is rewritten each time). Those are machine-generated blob
    # commits with no code change, so don't spend a test run on them -- a push
    # that touches only data/ is skipped, one that also touches code still runs.
    paths-ignore:
      - "data/**"
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e ".[dev]"

      # No DISCORD_WEBHOOK_URL here, deliberately: the clients are mocked and
      # CI must never be able to post to the real channel.
      - run: pytest -q
