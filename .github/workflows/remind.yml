name: remind

# Fires the day-before, morning-of, and "starting soon" pings.
#
# Every 15min because a ~30min-ahead ping is not reachable on an hourly cron:
# the drop would be 60min out on one run and 0min out on the next. Free on a
# public repo; on a private one this would burn ~1,400 of the 2,000 free
# Actions minutes per month.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pkmn-db-write
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e .

      - name: Send due reminders
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PKMN_TZ: America/Los_Angeles
        run: python -m pkmn_drops.cli remind

      - name: Persist state
        uses: ./.github/actions/commit-db
        with:
          message: "state: reminders sent"
