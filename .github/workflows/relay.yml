name: relay

# Phase 2: alert when a watchlisted product comes into stock.
#
# Reads NowInStock, which already aggregates Amazon, Target, Walmart and Best
# Buy. This is the design doc's own plan -- "the monitoring problem is already
# solved by people with dedicated infrastructure ... aggregate instead" -- and
# every direct-retailer path proved it right: Pokemon Center disallows
# /availabilities and sits behind Incapsula, Target's RedSky is Disallow: /,
# Reddit is Disallow: / and rate-limits, and Best Buy's API needs a key that
# needs a non-free email domain.
#
# One page every 15 minutes is ~96 requests/day against a site whose robots.txt
# permits /collectibles/ and sets no Crawl-delay. That is not the
# "high-frequency polling" the non-goals rule out.
#
# No API key required. If BESTBUY_API_KEY ever exists it layers on as a second
# source automatically and dedupe collapses the overlap.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pkmn-db-write # shares data/drops.db with calendar and remind
  cancel-in-progress: false

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e .

      - name: Check for restocks
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BESTBUY_API_KEY: ${{ secrets.BESTBUY_API_KEY }} # optional second source
          PKMN_TZ: America/Los_Angeles
        run: python -m pkmn_drops.cli relay

      - name: Persist state
        uses: ./.github/actions/commit-db
        with:
          message: "state: relay"
