name: commit-db
description: Commit the SQLite state DB back to the repo.

# Runners are ephemeral, so the DB only survives if it is committed. This is
# load-bearing: notified_at lives in that file, and if it is lost every
# reminder re-fires on the next run.
#
# The DB is binary and cannot be merged. The two writers left -- tick.yml
# (*/15) and calendar.yml (daily) -- share a concurrency group, so they
# serialize rather than collide. If a push races anyway (e.g. a human hits
# workflow_dispatch) we rebase preferring OUR copy rather than
# leaving a half-finished rebase behind. That choice is safe because both
# failure modes are bounded and self-healing:
#   - losing a row  -> the next daily scrape re-adds it (scrape is idempotent)
#   - losing notified_at -> one duplicate ping, and never a *missed* one
# Preferring "ours" can never silently drop a reminder, which is the only
# outcome that actually matters here.

inputs:
  message:
    description: Commit message
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        if [[ -z "$(git status --porcelain data/)" ]]; then
          echo "no state change to commit"
          exit 0
        fi

        git config user.name  "pkmn-drops[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/
        git commit -m "${{ inputs.message }}"

        for attempt in 1 2 3; do
          if git push; then
            echo "pushed on attempt ${attempt}"
            exit 0
          fi

          echo "push rejected; reconciling (attempt ${attempt})"
          git fetch origin "${GITHUB_REF_NAME}"
          if ! git rebase -X ours "origin/${GITHUB_REF_NAME}"; then
            git rebase --abort || true
            echo "::warning::rebase failed; retrying from a clean tree"
          fi
          sleep $((attempt * 3))
        done

        echo "::error::could not push state DB after 3 attempts; state not persisted"
        exit 1
